<style>
.asc-app { font-family: Tahoma, "Trebuchet MS", sans-serif; color: #1C1C1C; padding: 0; }
.asc-app h1, .asc-app h2, .asc-app h3 { font-family: Tahoma, "Trebuchet MS", sans-serif; color: #1C1C1C; margin: 0; font-weight: 700; }
.asc-app p { margin: 0; line-height: 1.6; }
.asc-app button { font-family: Tahoma, sans-serif; cursor: pointer; }
.asc-pill-blue { display: inline-block; background: #45AADD; color: #fff; padding: 4px 12px; border-radius: 999px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; }
.asc-pill-teal { display: inline-block; background: #7CFCEA; color: #1C1C1C; padding: 4px 12px; border-radius: 999px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; }
.asc-btn-primary { background: #45AADD; color: #fff; border: none; padding: 14px 28px; border-radius: 4px; font-size: 15px; font-weight: 700; transition: background 0.15s; letter-spacing: 0.3px; }
.asc-btn-primary:hover:not(:disabled) { background: #2E94C9; }
.asc-btn-primary:disabled { background: #B5D4F4; cursor: not-allowed; opacity: 0.6; }
.asc-btn-ghost { background: transparent; color: #1C1C1C; border: 1px solid #D3D1C7; padding: 12px 22px; border-radius: 4px; font-size: 14px; font-weight: 700; }
.asc-btn-ghost:hover { background: #F1EFE8; }
.asc-btn-link { background: transparent; color: #45AADD; border: none; padding: 0; font-size: 13px; font-weight: 700; }
.asc-btn-link:hover { color: #2E94C9; text-decoration: underline; }
.asc-btn-print { background: #fff; color: #45AADD; border: 1px solid #45AADD; padding: 8px 14px; border-radius: 4px; font-size: 12.5px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }
.asc-btn-print:hover { background: #F2F8FC; }
.asc-option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 1px solid #D3D1C7; border-radius: 4px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; background: #fff; font-size: 14px; line-height: 1.45; }
.asc-option:hover { border-color: #45AADD; background: #F2F8FC; }
.asc-option-checked { border-color: #45AADD; background: #E8F4FB; }
.asc-option input { margin: 3px 0 0 0; accent-color: #45AADD; flex-shrink: 0; }
.asc-card { background: #fff; border: 1px solid #D3D1C7; border-radius: 4px; padding: 20px 22px; margin-bottom: 14px; }
.asc-card-best { border: 2px solid #45AADD; }
.asc-progress-bar { height: 6px; background: #F1EFE8; border-radius: 999px; overflow: hidden; }
.asc-progress-fill { height: 100%; background: #45AADD; transition: width 0.4s ease; }
.asc-checklist-section { margin-bottom: 18px; }
.asc-checklist-section-title { font-size: 11px; letter-spacing: 1.5px; color: #5F5E5A; font-weight: 700; text-transform: uppercase; margin: 0 0 8px; padding-bottom: 5px; border-bottom: 1px solid #F1EFE8; }
.asc-checklist-item { display: flex; align-items: flex-start; gap: 10px; padding: 4px 0; font-size: 13.5px; line-height: 1.55; color: #1C1C1C; }
.asc-checklist-subs { margin-left: 22px; margin-top: 2px; margin-bottom: 4px; }
.asc-checklist-sub { display: flex; align-items: flex-start; gap: 10px; padding: 3px 0; font-size: 12.5px; line-height: 1.55; color: #444; }
</style>

        awareness: ["Career Exploration", "Industry Awareness"],
        exploration: ["Career Exploration"],
        handson: ["Hands-On Learning", "Hands-on Learning"],
        internship: ["Internships & Apprenticeships", "Internships & Apprenticeship"],
        readiness: ["Career Readiness", "Career Exploration"]
      };
      const branches = content.branches;
      const branchKeys = Object.keys(branches);
      const matched = new Set();
      const userArr = Array.isArray(userAns) ? userAns : [];
      userArr.forEach(u => {
        (TALENT_MAP[u] || []).forEach(name => {
          branchKeys.forEach(k => { if (k.toLowerCase() === name.toLowerCase()) matched.add(k); });
        });
      });
      if (matched.size === 0) {
        const out = [];
        branchKeys.forEach(k => { branches[k].forEach(item => out.push(item)); });
        return out;
      }
      const out = [];
      const matchedArr = Array.from(matched);
      matchedArr.forEach(k => {
        if (matchedArr.length > 1) out.push({ text: k, subs: [], _isHeading: true });
        branches[k].forEach(item => out.push(item));
      });
      return out;
    }
    return null;
  }
  
  let screen = "intro";

  // Check if a conditional question's parent answer matches its trigger value
  // Handles both single-select (answer === value) and multi-select (value in answer array)
  const conditionalActive = (cond) => {
    const ans = answers[cond.questionId];
    if (cond.multi) return Array.isArray(ans) && ans.includes(cond.value);
    return ans === cond.value;
  };
  
  const visibleQuestions = () => QUESTIONS.filter(q => {
    if (!q.conditional) return true;
    return conditionalActive(q.conditional);
  });
  
  function scoreExperience(name) {
    const profile = PROFILES[name];
    let exactMatches = 0, lowerTierMatches = 0, total = 0;
    const misses = [];
    for (const q of QUESTIONS) {
      if (q.conditional && !conditionalActive(q.conditional)) continue;
      const accepted = profile[q.id];
      if (accepted === "*") continue;
      total++;
      const userAns = answers[q.id];
      // Special case: individualteam="either" means the user can accommodate any setup,
      // so it should always count as an exact match for whatever the experience requires.
      if (q.id === "individualteam" && userAns === "either") {
        exactMatches++;
        continue;
      }
      if (q.type === "multi") {
        const acceptedArr = Array.isArray(accepted) ? accepted : [accepted];
        const hit = userAns && userAns.some(a => acceptedArr.includes(a));
        if (hit) exactMatches++;
        else misses.push({ q, accepted: acceptedArr });
      } else {
        const acceptedArr = Array.isArray(accepted) ? accepted : [accepted];
        if (acceptedArr.includes(userAns)) exactMatches++;
        else if (q.cumulative) {
          const userIdx = q.tiers.indexOf(userAns);
          const requiredIdx = Math.min(...acceptedArr.map(a => q.tiers.indexOf(a)).filter(i => i >= 0));
          if (userIdx > requiredIdx) lowerTierMatches++;
          else misses.push({ q, accepted: acceptedArr });
        } else {
          misses.push({ q, accepted: acceptedArr });
        }
      }
    }
    return { name, exactMatches, lowerTierMatches, total, misses };
  }
  
  function classifyResults() {
    // Score every underlying experience first
    const scoredByName = {};
    EXPERIENCES.forEach(name => { scoredByName[name] = scoreExperience(name); });
    
    // For each result item (which may aggregate multiple children), pick the best child.
    // "Best" priority:
    //   1) exact match (0 misses, 0 lowerTierMatches)
    //   2) achievable looser (0 misses, lowerTierMatches > 0)
    //   3) one-step-away (1 miss) — sort children by fewest misses
    // The card inherits the best child's status, but we keep a reference to which child won.
    function pickBestChild(childNames) {
      const scores = childNames.map(n => scoredByName[n]).filter(s => s); // guard
      const sorted = scores.slice().sort((a, b) => {
        if (a.misses.length !== b.misses.length) return a.misses.length - b.misses.length;
        return a.lowerTierMatches - b.lowerTierMatches;
      });
      return sorted[0];
    }
    
    // Wrap each result item with classification metadata
    const items = RESULT_ITEMS.map(ri => {
      const best = pickBestChild(ri.children);
      return {
        ri: ri,
        bestChild: best,
        misses: best.misses.length,
        lowerTierMatches: best.lowerTierMatches,
        exactMatches: best.exactMatches
      };
    });
    
    const exact = items.filter(i => i.misses === 0 && i.lowerTierMatches === 0);
    const achievableLooser = items.filter(i => i.misses === 0 && i.lowerTierMatches > 0);
    const oneStepAway = items.filter(i => i.misses === 1);
    
    // Sort by the result item's order (low = light → high = intense)
    const sortByOrder = (a, b) => a.ri.order - b.ri.order;
    exact.sort(sortByOrder);
    achievableLooser.sort(sortByOrder);
    oneStepAway.sort(sortByOrder);
    
    const nonExact = [...achievableLooser, ...oneStepAway];
    return { exact, nonExact, oneStepAway };
  }
  
  function describeStretch(miss) {
    const q = miss.q, accepted = miss.accepted;
    const labels = q.options.filter(o => accepted.includes(o.value)).map(o => o.label.toLowerCase()).join(" or ");
    if (q.id === "supervision") return "Requires " + labels;
    if (q.id === "duration") return "Requires " + labels;
    if (q.id === "pay") return "Requires the ability to pay students";
    if (q.id === "dol") return "Requires willingness to register with the U.S. Department of Labor";
    if (q.id === "onsite") return "Requires " + labels;
    if (q.id === "projectrole") return "Requires a " + labels + " setup";
    if (q.id === "individualteam") return "Requires students to work " + labels;
    if (q.id === "talent") return "Requires offering: " + labels;
    return "Adjust your answer on: " + q.text;
  }
  
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
  
  function buildChecklist(name) {
    const profile = PROFILES[name];
    const expContent = CONTENT[name] || {};
    const sections = [];
    for (const q of QUESTIONS) {

      const profileVal = profile[ind];
      if (profileVal === "*") continue;
      const userAns = answers[ind];
      const content = expContent[ind];
      if (!content) continue;
      const items = resolveContent(content, ind, userAns);
      if (!items || items.length === 0) continue;
      sections.push({ id: ind, label: SECTION_LABELS[ind], items });
    }
    return sections;
  }

      // Editable state — inputs + Save
      html += '<div style="padding: 14px 16px; margin-bottom: 22px; background: #FAF8F2; border-radius: 4px; border: 1px solid #E8E6DD;">' +
        '<div style="font-size: 12px; letter-spacing: 1px; color: #5F5E5A; font-weight: 700; text-transform: uppercase; margin-bottom: 10px;">Add your details to printed checklists <span style="text-transform: none; font-weight: 400; letter-spacing: 0; color: #888780; font-size: 12px;">(optional)</span></div>' +
        '<div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">' +
          '<input type="text" id="asc-print-name" placeholder="Your name" value="' + nameVal + '" oninput="window.__ascSetPrintName(this.value)" style="flex: 1; min-width: 160px; padding: 9px 12px; border: 1px solid #D3D1C7; border-radius: 4px; font-size: 13.5px; font-family: inherit; color: #1C1C1C; background: #fff;" />' +
          '<input type="text" id="asc-print-org" placeholder="Organization" value="' + orgVal + '" oninput="window.__ascSetPrintOrg(this.value)" style="flex: 1; min-width: 160px; padding: 9px 12px; border: 1px solid #D3D1C7; border-radius: 4px; font-size: 13.5px; font-family: inherit; color: #1C1C1C; background: #fff;" />' +
          '<button class="asc-btn-primary" style="padding: 9px 18px; font-size: 13.5px;" onclick="window.__ascSavePrintDetails()">Save</button>' +
        '</div>' +
      '</div>';
    }
    
    // First 3 cards visible
    const visibleCount = Math.min(3, totalCards);
    for (let i = 0; i < visibleCount; i++) {
      const c = allCards[i];
      html += renderExperienceCard(c.item, c.isStretch, c.isExact);
    }
    
    // Remaining cards behind a "See more" expander
    if (totalCards > 3) {
      const hiddenCount = totalCards - 3;
      html += '<div id="asc-more-wrap" style="display: none;">';
      for (let i = 3; i < totalCards; i++) {
        const c = allCards[i];
        html += renderExperienceCard(c.item, c.isStretch, c.isExact);
      }
      html += '</div>';
      html += '<div style="display: flex; justify-content: center; margin: 8px 0 16px;">' +
        '<button class="asc-btn-ghost" id="asc-more-btn" onclick="window.__ascShowMore()">See ' + hiddenCount + ' more option' + (hiddenCount === 1 ? '' : 's') + ' \u2193</button>' +
        '</div>';
    }
    
    html += '<div style="margin-top: 32px; padding: 24px 26px; background: #1C1C1C; color: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;">' +
      '<div style="flex: 1; min-width: 220px;">' +
        '<h3 style="font-size: 18px; color: #fff; margin-bottom: 6px;">Ready to start?</h3>' +
        '<p style="font-size: 13.5px; color: #D3D1C7; line-height: 1.55;">Connect with a local intermediary who can help you launch a work-based learning experience.</p>' +
      '</div>' +
      '<button class="asc-btn-primary" onclick="window.__ascCTA()">Find a local intermediary \u2197</button>' +
    '</div>';
    return html;
  }
  
  function render() {
    const root = document.getElementById("asc-app");
    if (!root) return;
    if (screen === "intro") root.innerHTML = renderIntro();
    else if (screen === "quiz") root.innerHTML = renderQuiz();
    else root.innerHTML = renderResults();
  }
  
  window.__ascStart = function() { screen = "quiz"; currentQ = 0; hasSeenResults = false; openTooltips.clear(); render(); };
  window.__ascReset = function() { screen = "intro"; currentQ = 0; hasSeenResults = false; printName = ""; printOrg = ""; printDetailsSaved = false; openTooltips.clear(); Object.keys(answers).forEach(k => delete answers[k]); render(); };
  window.__ascBack = function() { if (currentQ > 0) { currentQ--; openTooltips.clear(); render(); } };
  window.__ascSetPrintName = function(v) { printName = v; };
  window.__ascSetPrintOrg = function(v) { printOrg = v; };
  window.__ascSavePrintDetails = function() {
    // Pull latest values from the inputs (in case oninput state is stale)
    const nameEl = document.getElementById("asc-print-name");
    const orgEl = document.getElementById("asc-print-org");
    if (nameEl) printName = nameEl.value;
    if (orgEl) printOrg = orgEl.value;
    printDetailsSaved = true;
    render();
  };
  window.__ascEditPrintDetails = function() {
    printDetailsSaved = false;
    render();
  };
  window.__ascNext = function() {
    const visible = visibleQuestions();
    if (currentQ < visible.length - 1) { currentQ++; openTooltips.clear(); render(); }
    else { screen = "results"; hasSeenResults = true; openTooltips.clear(); render(); }
  };
  window.__ascJumpToQuestion = function(qid) {
    const visible = visibleQuestions();
    const idx = visible.findIndex(q => q.id === qid);
    if (idx === -1) return;
    currentQ = idx;
    screen = "quiz";
    openTooltips.clear();
    // Scroll to top so the user clearly lands on the question
    render();
    setTimeout(() => { try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch(e) { window.scrollTo(0, 0); } }, 0);
  };
  window.__ascReturnToResults = function() {
    screen = "results";
    render();
    setTimeout(() => { try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch(e) { window.scrollTo(0, 0); } }, 0);
  };
  window.__ascAnswer = function(qid, val, isMulti) {
    if (isMulti) {
      const cur = answers[qid] || [];
      if (cur.includes(val)) answers[qid] = cur.filter(v => v !== val);
      else answers[qid] = [...cur, val];
    } else {
      answers[qid] = val;
    }
    // Clean up answers for any conditional question whose trigger is no longer satisfied
    QUESTIONS.forEach(q => {
      if (q.conditional && q.conditional.questionId === qid && !conditionalActive(q.conditional)) {
        delete answers[q.id];
      }
    });
    // Clamp currentQ if a conditional question was removed and currentQ now exceeds visible length
    const visible = visibleQuestions();
    if (currentQ >= visible.length) currentQ = visible.length - 1;
    render();
  };
  window.__ascToggle = function(id, btn) {
    const el = document.getElementById(id);
    if (!el) return;
    const open = el.style.display === "block";
    el.style.display = open ? "none" : "block";
    btn.innerHTML = open ? "Show next steps \u2193" : "Hide next steps \u2191";
  };
  window.__ascToggleTip = function(qid) {
    if (openTooltips.has(qid)) openTooltips.delete(qid);
    else openTooltips.add(qid);
    render();
  };
  window.__ascShowMore = function() {
    const wrap = document.getElementById("asc-more-wrap");
    const btn = document.getElementById("asc-more-btn");
    if (wrap) wrap.style.display = "block";
    if (btn) btn.style.display = "none";
  };
  window.__ascCTA = function() {
    if (typeof openLink === "function") openLink(INTERMEDIARY_URL);
    else window.open(INTERMEDIARY_URL, "_blank");
  };
  window.__ascPrint = function(itemId) {
    const ri = RESULT_ITEMS.find(r => r.id === itemId);
    if (!ri) return;
    function escHtml(s) { return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
    
    const name = ri.name;
    const definition = ri.combined ? ri.definition : (DEFINITIONS[ri.children[0]] || "");
    let bodyHtml = '';
    
    if (ri.template === "A") {
      // School-based experiences: short 5-step checklist + sub-type reference paragraphs
      bodyHtml += '<div class="section">';
      bodyHtml += '<div class="section-title">Readiness checklist</div>';
      ri.actions.forEach(action => {
        bodyHtml += '<div class="item"><span class="cb"></span><span>' + escHtml(action) + '</span></div>';
      });
      bodyHtml += '</div>';
      // Sub-type reference section
      bodyHtml += '<div class="section ref-section">';
      bodyHtml += '<div class="section-title">What each of these looks like</div>';
      bodyHtml += '<p class="ref-intro">Use this quick reference to identify which sub-type best fits your industry and capacity. Employer involvement looks different in each.</p>';
      ri.subTypes.forEach(st => {
        bodyHtml += '<div class="ref-block">';
        bodyHtml += '<div class="ref-name">' + escHtml(st.name) + '</div>';
        bodyHtml += '<div class="ref-desc">' + escHtml(st.description) + '</div>';
        bodyHtml += '</div>';
      });
      bodyHtml += '</div>';
    } else if (ri.template === "B") {
      // Internships / Apprenticeships: member definitions + consolidated checklist with member tags
      bodyHtml += '<div class="section">';
      bodyHtml += '<div class="section-title">The ' + escHtml(name.toLowerCase()) + ' in this family</div>';
      ri.memberDefs.forEach(md => {
        bodyHtml += '<div class="member-block">';
        bodyHtml += '<div class="member-name">' + escHtml(md.name) + '</div>';
        bodyHtml += '<div class="member-desc">' + escHtml(md.description) + '</div>';
        bodyHtml += '</div>';
      });
      bodyHtml += '</div>';
      bodyHtml += '<div class="checklist-intro">Items below apply to all members of this family unless tagged.</div>';
      ri.checklist.forEach(section => {
        bodyHtml += '<div class="section">';
        bodyHtml += '<div class="section-title">' + escHtml(section.section) + '</div>';
        section.items.forEach(item => {
          let tagHtml = '';
          if (item.appliesTo && item.appliesTo.length) {
            tagHtml = ' <span class="applies-tag">Applies to: ' + item.appliesTo.map(escHtml).join(', ') + '</span>';
          }
          bodyHtml += '<div class="item"><span class="cb"></span><span>' + escHtml(item.text) + tagHtml + '</span></div>';
        });
        bodyHtml += '</div>';
      });
    } else {
      // Standalone (Co-Op): pull long-form, conditional content from spreadsheet
      const childName = ri.children[0];
      const sections = buildChecklist(childName);
      sections.forEach(section => {
        bodyHtml += '<div class="section">';
        bodyHtml += '<div class="section-title">' + escHtml(section.label) + '</div>';
        section.items.forEach(item => {
          if (item._isHeading) {
            bodyHtml += '<div class="heading">' + escHtml(item.text) + '</div>';
            return;
          }
          bodyHtml += '<div class="item"><span class="cb"></span><span>' + escHtml(item.text) + '</span></div>';
          if (item.subs && item.subs.length) {
            bodyHtml += '<div class="subs">';
            item.subs.forEach(sub => {
              bodyHtml += '<div class="sub-item"><span class="cb-small"></span><span>' + escHtml(sub) + '</span></div>';
            });
            bodyHtml += '</div>';
          }
        });
        bodyHtml += '</div>';
      });
    }
    
    // Prepared for line
    let preparedFor = '';
    const trimmedName = (printName || "").trim();
    const trimmedOrg = (printOrg || "").trim();
    if (trimmedName || trimmedOrg) {
      let pieces = [];
      if (trimmedName) pieces.push(escHtml(trimmedName));
      if (trimmedOrg) pieces.push(escHtml(trimmedOrg));
      preparedFor = '<div class="prep">Prepared for: ' + pieces.join(' \u2022 ') + '</div>';
    }
    
    const html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Readiness checklist: ' + escHtml(name) + ' \u2014 Ascend Indiana</title>' +
      '<style>' +
      '@media print { @page { margin: 0.6in; } .no-print { display: none !important; } body { padding: 0 !important; max-width: none !important; } }' +
      'body { font-family: Tahoma, "Trebuchet MS", sans-serif; color: #1C1C1C; max-width: 720px; margin: 0 auto; padding: 40px 32px; line-height: 1.55; }' +
      '.hd { display: flex; align-items: center; justify-content: space-between; padding-bottom: 18px; border-bottom: 1px solid #E8E6DD; margin-bottom: 24px; }' +
      '.hd img { height: 32px; width: auto; }' +
      '.tag { font-size: 11px; letter-spacing: 2px; color: #45AADD; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }' +
      'h1 { font-size: 26px; margin: 0 0 8px; line-height: 1.2; font-weight: 700; }' +
      '.prep { font-size: 13px; color: #5F5E5A; margin-bottom: 14px; font-weight: 700; }' +
      '.def { font-size: 13.5px; color: #444; margin-bottom: 28px; }' +
      '.section { margin-bottom: 22px; page-break-inside: avoid; }' +
      '.section-title { font-size: 11px; letter-spacing: 1.5px; color: #5F5E5A; font-weight: 700; text-transform: uppercase; margin: 0 0 12px; padding-bottom: 6px; border-bottom: 1px solid #F1EFE8; }' +
      '.heading { font-weight: 700; font-size: 13px; margin: 10px 0 6px; }' +
      '.item { display: flex; align-items: flex-start; gap: 10px; padding: 5px 0; font-size: 13.5px; line-height: 1.5; }' +
      '.cb { flex-shrink: 0; width: 14px; height: 14px; border: 1.5px solid #1C1C1C; border-radius: 2px; margin-top: 3px; background: #fff; display: inline-block; }' +
      '.subs { margin-left: 26px; margin-top: 2px; margin-bottom: 4px; }' +
      '.sub-item { display: flex; align-items: flex-start; gap: 10px; padding: 3px 0; font-size: 12.5px; line-height: 1.5; color: #444; }' +
      '.cb-small { flex-shrink: 0; width: 12px; height: 12px; border: 1.2px solid #888780; border-radius: 2px; margin-top: 3px; background: #fff; display: inline-block; }' +
      '.applies-tag { display: inline-block; margin-left: 4px; font-size: 11px; font-weight: 700; color: #45AADD; letter-spacing: 0.5px; vertical-align: 1px; }' +
      '.ref-intro { font-size: 12.5px; color: #5F5E5A; margin: 0 0 14px; line-height: 1.5; font-style: italic; }' +
      '.ref-block { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px dotted #E8E6DD; }' +
      '.ref-block:last-child { border-bottom: none; }' +
      '.ref-name { font-weight: 700; font-size: 13.5px; margin-bottom: 4px; color: #1C1C1C; }' +
      '.ref-desc { font-size: 12.5px; color: #444; line-height: 1.55; }' +
      '.member-block { margin-bottom: 12px; padding-left: 14px; border-left: 2px solid #45AADD; }' +
      '.member-name { font-weight: 700; font-size: 13.5px; margin-bottom: 3px; color: #1C1C1C; }' +
      '.member-desc { font-size: 12.5px; color: #444; line-height: 1.55; }' +
      '.checklist-intro { font-size: 12.5px; color: #5F5E5A; margin: 0 0 18px; font-style: italic; }' +
      '.help { margin-top: 32px; padding: 18px 22px; background: #F2F8FC; border-left: 4px solid #45AADD; border-radius: 0 4px 4px 0; page-break-inside: avoid; }' +
      '.help-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }' +
      '.help-txt { font-size: 13px; color: #444; margin: 0; line-height: 1.5; }' +
      '.help-link { color: #45AADD; text-decoration: none; font-weight: 700; word-break: break-all; }' +
      '.print-btn { background: #45AADD; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }' +
      '.print-btn:hover { background: #2E94C9; }' +
      '</style></head><body>' +
      '<div class="hd">' +
        '<img src="' + LOGO_URL + '" alt="Ascend Indiana" />' +
        '<button class="print-btn no-print" onclick="window.print()">Print this page</button>' +
      '</div>' +
      '<div class="tag">Readiness checklist</div>' +
      '<h1>' + escHtml(name) + '</h1>' +
      preparedFor +
      '<p class="def">' + escHtml(definition) + '</p>' +
      bodyHtml +
      '<div class="help">' +
        '<div class="help-title">For help</div>' +
        '<p class="help-txt">Connect with a local intermediary who can help you launch this work-based learning experience:<br><a class="help-link" href="' + INTERMEDIARY_URL + '">' + INTERMEDIARY_URL + '</a></p>' +
      '</div>' +
      '</body></html>';
    const w = window.open('', '_blank');
    if (!w) { alert('Pop-up blocked. Please allow pop-ups to print the checklist.'); return; }
    w.document.open();
    w.document.write(html);
    w.document.close();
  };
  
  render();
})();
</script>

</div>
</body>
</html>
