<style>
.asc-app { font-family: Tahoma, "Trebuchet MS", sans-serif; color: #1C1C1C; padding: 0; }
.asc-app h1, .asc-app h2, .asc-app h3 { font-family: Tahoma, "Trebuchet MS", sans-serif; color: #1C1C1C; margin: 0; font-weight: 700; }
.asc-app p { margin: 0; line-height: 1.6; }
.asc-app button { font-family: Tahoma, sans-serif; cursor: pointer; }
.asc-pill-blue { display: inline-block; background: #45AADD; color: #fff; padding: 4px 12px; border-radius: 999px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; }
.asc-pill-teal { display: inline-block; background: #7CFCEA; color: #1C1C1C; padding: 4px 12px; border-radius: 999px; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; }
.asc-btn-primary { background: #45AADD; color: #fff; border: none; padding: 14px 28px; border-radius: 4px; font-size: 15px; font-weight: 700; transition: background 0.15s; letter-spacing: 0.3px; }
.asc-btn-primary:hover:not(:disabled) { background: #2E94C9; }
.asc-btn-primary:disabled { background: #B5D4F4; cursor: not-allowed; opacity: 0.6; }
.asc-btn-ghost { background: transparent; color: #1C1C1C; border: 1px solid #D3D1C7; padding: 12px 22px; border-radius: 4px; font-size: 14px; font-weight: 700; }
.asc-btn-ghost:hover { background: #F1EFE8; }
.asc-btn-link { background: transparent; color: #45AADD; border: none; padding: 0; font-size: 13px; font-weight: 700; }
.asc-btn-link:hover { color: #2E94C9; text-decoration: underline; }
.asc-btn-print { background: #fff; color: #45AADD; border: 1px solid #45AADD; padding: 8px 14px; border-radius: 4px; font-size: 12.5px; font-weight: 700; display: inline-flex; align-items: center; gap: 6px; }
.asc-btn-print:hover { background: #F2F8FC; }
.asc-option { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; border: 1px solid #D3D1C7; border-radius: 4px; margin-bottom: 10px; cursor: pointer; transition: all 0.15s; background: #fff; font-size: 14px; line-height: 1.45; }
.asc-option:hover { border-color: #45AADD; background: #F2F8FC; }
.asc-option-checked { border-color: #45AADD; background: #E8F4FB; }
.asc-option input { margin: 3px 0 0 0; accent-color: #45AADD; flex-shrink: 0; }
.asc-card { background: #fff; border: 1px solid #D3D1C7; border-radius: 4px; padding: 20px 22px; margin-bottom: 14px; }
.asc-card-best { border: 2px solid #45AADD; }
.asc-progress-bar { height: 6px; background: #F1EFE8; border-radius: 999px; overflow: hidden; }
.asc-progress-fill { height: 100%; background: #45AADD; transition: width 0.4s ease; }
.asc-checklist-section { margin-bottom: 18px; }
.asc-checklist-section-title { font-size: 11px; letter-spacing: 1.5px; color: #5F5E5A; font-weight: 700; text-transform: uppercase; margin: 0 0 8px; padding-bottom: 5px; border-bottom: 1px solid #F1EFE8; }
.asc-checklist-item { display: flex; align-items: flex-start; gap: 10px; padding: 4px 0; font-size: 13.5px; line-height: 1.55; color: #1C1C1C; }
.asc-checklist-subs { margin-left: 22px; margin-top: 2px; margin-bottom: 4px; }
.asc-checklist-sub { display: flex; align-items: flex-start; gap: 10px; padding: 3px 0; font-size: 12.5px; line-height: 1.55; color: #444; }
</style>

      const checked = isMulti ? (answers[q.id] || []).includes(opt.value) : answers[q.id] === opt.value;
      return '<label class="asc-option ' + (checked ? "asc-option-checked" : "") + '">' +
        '<input type="' + (isMulti ? "checkbox" : "radio") + '" name="q-' + q.id + '" value="' + opt.value + '"' + (checked ? " checked" : "") + ' onchange="window.__ascAnswer(\'' + q.id + '\', \'' + opt.value + '\', ' + isMulti + ')" />' +
        '<span>' + escapeHtml(opt.label) + '</span>' +
      '</label>';
    }).join("");
    
    // Bottom nav: in revisit mode (already saw results), show "See updated results" jump-back
    let bottomNav = '';
    if (hasSeenResults) {
      bottomNav = '<div style="display: flex; justify-content: space-between; align-items: center; padding: 16px 4px 8px; border-top: 1px solid #F1EFE8; margin-top: 8px; gap: 12px; flex-wrap: wrap;">' +
        '<button class="asc-btn-ghost" onclick="window.__ascBack()" ' + (currentQ === 0 ? 'style="visibility: hidden;"' : '') + '>\u2190 Back</button>' +
        '<div style="display: flex; gap: 10px; flex-wrap: wrap;">' +
          (currentQ < totalVisible - 1 ? '<button class="asc-btn-ghost" onclick="window.__ascNext()" ' + (showNext ? "" : "disabled") + '>Next \u2192</button>' : '') +
          '<button class="asc-btn-primary" onclick="window.__ascReturnToResults()" ' + (showNext ? "" : "disabled") + '>See updated results</button>' +
        '</div>' +
      '</div>';
    } else {
      bottomNav = '<div style="display: flex; justify-content: space-between; align-items: center; padding: 16px 4px 8px; border-top: 1px solid #F1EFE8; margin-top: 8px;">' +
        '<button class="asc-btn-ghost" onclick="window.__ascBack()" ' + (currentQ === 0 ? 'style="visibility: hidden;"' : '') + '>\u2190 Back</button>' +
        '<button class="asc-btn-primary" onclick="window.__ascNext()" ' + (showNext ? "" : "disabled") + '>' + (currentQ === totalVisible - 1 ? "See your results" : "Next \u2192") + '</button>' +
      '</div>';
    }
    
    return renderHeader() +
      '<div style="padding: 24px 4px 12px;">' +
        '<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">' +
          '<span style="font-size: 12px; color: #5F5E5A; letter-spacing: 1px; font-weight: 700;">QUESTION ' + (currentQ + 1) + ' OF ' + totalVisible + '</span>' +
        '</div>' +
        '<div class="asc-progress-bar"><div class="asc-progress-fill" style="width: ' + progress + '%;"></div></div>' +
      '</div>' +
      '<div style="padding: 20px 4px 8px;">' +
        '<h2 style="font-size: 22px; line-height: 1.3; margin-bottom: 22px; font-weight: 700;">' + escapeHtml(q.text) + '</h2>' +
        '<div>' + optionsHtml + '</div>' +
      '</div>' +
      bottomNav;
  }
  
  function renderExperienceCard(scored, isStretch, isExact) {
    const name = scored.name;
    const cardId = "card-" + name.replace(/[^a-z0-9]/gi, "");
    const definition = DEFINITIONS[name] || "";
    const actions = ACTIONS[name] || [];
    const categoryName = EXP_CATEGORY[name];
    const category = CATEGORIES[categoryName];
    
    // Pills row: category tag (always) + status pill (Best match for exact, Almost a fit for stretch)
    let pillsRow = '<div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;">';
    if (category) {
      pillsRow += '<span style="display: inline-block; background: ' + category.bg + '; color: ' + category.text + '; padding: 3px 10px; border-radius: 999px; font-size: 10px; letter-spacing: 1.2px; text-transform: uppercase; font-weight: 700;">' + escapeHtml(categoryName) + '</span>';
    }
    if (isExact) pillsRow += '<span class="asc-pill-blue">Best match</span>';
    else if (isStretch) pillsRow += '<span class="asc-pill-teal">Almost a fit</span>';
    pillsRow += '</div>';
    
    let stretchNote = "";
    if (isStretch && scored.misses.length === 1) {
      const miss = scored.misses[0];
      const stretchText = describeStretch(miss);
      stretchNote = '<button onclick="window.__ascJumpToQuestion(\'' + miss.q.id + '\')" style="display: block; width: 100%; text-align: left; margin-top: 10px; padding: 12px 14px; background: #F0FFFA; border: 1px solid #7CFCEA; border-left: 3px solid #7CFCEA; border-radius: 0 4px 4px 0; font-size: 13px; color: #2C2C2A; cursor: pointer; font-family: inherit; transition: background 0.15s;" onmouseover="this.style.background=\'#E0FFF6\'" onmouseout="this.style.background=\'#F0FFFA\'">' +
        '<div style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">' +
          '<div><strong style="font-weight: 700;">To unlock this:</strong> ' + escapeHtml(stretchText) + '</div>' +
          '<span style="color: #45AADD; font-weight: 700; white-space: nowrap; font-size: 12.5px;">Update answer \u2192</span>' +
        '</div>' +
      '</button>';
    }
    const actionsHtml = '<ol style="margin: 0; padding-left: 22px; font-size: 13.5px; line-height: 1.7; color: #1C1C1C;">' +
      actions.map(a => '<li style="margin-bottom: 6px;">' + escapeHtml(a) + '</li>').join("") +
      '</ol>';
    return '<div class="asc-card ' + (isExact ? "asc-card-best" : "") + '">' +
      pillsRow +
      '<h3 style="font-size: 18px; margin-bottom: 8px; font-weight: 700;">' + escapeHtml(name) + '</h3>' +
      '<p style="font-size: 13.5px; color: #444; margin-bottom: 14px; line-height: 1.55;">' + escapeHtml(definition) + '</p>' +
      stretchNote +
      '<div style="margin-top: 14px;">' +
        '<button class="asc-btn-link" onclick="window.__ascToggle(\'' + cardId + '\', this)">Show next steps \u2193</button>' +
        '<div id="' + cardId + '" style="display: none; margin-top: 14px; padding-top: 16px; border-top: 1px solid #F1EFE8;">' +
          '<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 12px; flex-wrap: wrap;">' +
            '<p style="font-size: 12px; letter-spacing: 1px; color: #5F5E5A; font-weight: 700; margin: 0;">TO PREPARE FOR THIS EXPERIENCE</p>' +
            '<button class="asc-btn-print" onclick="window.__ascPrint(\'' + escapeHtml(name).replace(/\'/g, "\\\\'") + '\')">' +
              '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>' +
              'Print full checklist' +
            '</button>' +
          '</div>' +
          actionsHtml +
        '</div>' +
      '</div>' +
    '</div>';
  }
  
  function renderResults() {
    const { exact, nonExact, oneStepAway } = classifyResults();
    
    // Combine exact matches at top + non-exact (achievable looser + 1-step-away) below
    // Cap at 3 visible by default; rest go behind "See more"
    const allCards = [];
    exact.forEach(s => allCards.push({ scored: s, isStretch: false, isExact: true }));
    nonExact.forEach(s => allCards.push({ scored: s, isStretch: s.misses.length > 0, isExact: false }));
    
    const totalCards = allCards.length;
    const totalAchievable = exact.length + (nonExact.length - oneStepAway.length);
    
    let html = renderHeader();
    html += '<div style="padding: 24px 4px 12px;">';
    html += '<h1 style="font-size: 26px; margin-bottom: 8px; line-height: 1.25;">Your work-based learning matches</h1>';
    if (totalCards === 0) {
      html += '<p style="font-size: 14px; color: #5F5E5A;">No experiences matched your answers. Use the back button to revisit your responses.</p>';
    } else if (totalAchievable === 0) {
      html += '<p style="font-size: 14px; color: #5F5E5A; margin-bottom: 24px;">No experiences fully matched, but the options below are close to your current capacity.</p>';
    } else {
      const word = totalAchievable === 1 ? "experience fits" : "experiences fit";
      let extra = oneStepAway.length > 0 ? " A few more are within reach with a small adjustment." : "";
      html += '<p style="font-size: 14px; color: #5F5E5A; margin-bottom: 24px;">Based on your answers, ' + totalAchievable + ' ' + word + ' your current capacity.' + extra + '</p>';
    }
    html += '</div>';
    
    // First 3 cards visible
    const visibleCount = Math.min(3, totalCards);
    for (let i = 0; i < visibleCount; i++) {
      const c = allCards[i];
      html += renderExperienceCard(c.scored, c.isStretch, c.isExact);
    }
    
    // Remaining cards behind a "See more" expander
    if (totalCards > 3) {
      const hiddenCount = totalCards - 3;
      html += '<div id="asc-more-wrap" style="display: none;">';
      for (let i = 3; i < totalCards; i++) {
        const c = allCards[i];
        html += renderExperienceCard(c.scored, c.isStretch, c.isExact);
      }
      html += '</div>';
      html += '<div style="display: flex; justify-content: center; margin: 8px 0 16px;">' +
        '<button class="asc-btn-ghost" id="asc-more-btn" onclick="window.__ascShowMore()">See ' + hiddenCount + ' more option' + (hiddenCount === 1 ? '' : 's') + ' \u2193</button>' +
        '</div>';
    }
    
    html += '<div style="margin-top: 32px; padding: 24px 26px; background: #1C1C1C; color: #fff; border-radius: 4px; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;">' +
      '<div style="flex: 1; min-width: 220px;">' +
        '<h3 style="font-size: 18px; color: #fff; margin-bottom: 6px;">Ready to start?</h3>' +
        '<p style="font-size: 13.5px; color: #D3D1C7; line-height: 1.55;">Connect with a local intermediary who can help you launch a work-based learning experience.</p>' +
      '</div>' +
      '<button class="asc-btn-primary" onclick="window.__ascCTA()">Find a local intermediary \u2197</button>' +
    '</div>';
    return html;
  }
  
  function render() {
    const root = document.getElementById("asc-app");
    if (!root) return;
    if (screen === "intro") root.innerHTML = renderIntro();
    else if (screen === "quiz") root.innerHTML = renderQuiz();
    else root.innerHTML = renderResults();
  }
  
  window.__ascStart = function() { screen = "quiz"; currentQ = 0; hasSeenResults = false; render(); };
  window.__ascReset = function() { screen = "intro"; currentQ = 0; hasSeenResults = false; Object.keys(answers).forEach(k => delete answers[k]); render(); };
  window.__ascBack = function() { if (currentQ > 0) { currentQ--; render(); } };
  window.__ascNext = function() {
    const visible = visibleQuestions();
    if (currentQ < visible.length - 1) { currentQ++; render(); }
    else { screen = "results"; hasSeenResults = true; render(); }
  };
  window.__ascJumpToQuestion = function(qid) {
    const visible = visibleQuestions();
    const idx = visible.findIndex(q => q.id === qid);
    if (idx === -1) return;
    currentQ = idx;
    screen = "quiz";
    // Scroll to top so the user clearly lands on the question
    render();
    setTimeout(() => { try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch(e) { window.scrollTo(0, 0); } }, 0);
  };
  window.__ascReturnToResults = function() {
    screen = "results";
    render();
    setTimeout(() => { try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch(e) { window.scrollTo(0, 0); } }, 0);
  };
  window.__ascAnswer = function(qid, val, isMulti) {
    if (isMulti) {
      const cur = answers[qid] || [];
      if (cur.includes(val)) answers[qid] = cur.filter(v => v !== val);
      else answers[qid] = [...cur, val];
    } else {
      answers[qid] = val;
      QUESTIONS.forEach(q => {
        if (q.conditional && q.conditional.questionId === qid && q.conditional.value !== val) {
          delete answers[q.id];
        }
      });
    }
    // Clamp currentQ if a conditional question was removed and currentQ now exceeds visible length
    const visible = visibleQuestions();
    if (currentQ >= visible.length) currentQ = visible.length - 1;
    render();
  };
  window.__ascToggle = function(id, btn) {
    const el = document.getElementById(id);
    if (!el) return;
    const open = el.style.display === "block";
    el.style.display = open ? "none" : "block";
    btn.innerHTML = open ? "Show next steps \u2193" : "Hide next steps \u2191";
  };
  window.__ascShowMore = function() {
    const wrap = document.getElementById("asc-more-wrap");
    const btn = document.getElementById("asc-more-btn");
    if (wrap) wrap.style.display = "block";
    if (btn) btn.style.display = "none";
  };
  window.__ascCTA = function() {
    if (typeof openLink === "function") openLink(INTERMEDIARY_URL);
    else window.open(INTERMEDIARY_URL, "_blank");
  };
  window.__ascPrint = function(name) {
    const definition = DEFINITIONS[name] || "";
    const sections = buildChecklist(name);
    function escHtml(s) { return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
    let sectionsHtml = '';
    sections.forEach(section => {
      sectionsHtml += '<div class="section">';
      sectionsHtml += '<div class="section-title">' + escHtml(section.label) + '</div>';
      section.items.forEach(item => {
        if (item._isHeading) {
          sectionsHtml += '<div class="heading">' + escHtml(item.text) + '</div>';
          return;
        }
        sectionsHtml += '<div class="item"><span class="cb"></span><span>' + escHtml(item.text) + '</span></div>';
        if (item.subs && item.subs.length) {
          sectionsHtml += '<div class="subs">';
          item.subs.forEach(sub => {
            sectionsHtml += '<div class="sub-item"><span class="cb-small"></span><span>' + escHtml(sub) + '</span></div>';
          });
          sectionsHtml += '</div>';
        }
      });
      sectionsHtml += '</div>';
    });
    const html = '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Readiness checklist: ' + escHtml(name) + ' \u2014 Ascend Indiana</title>' +
      '<style>' +
      '@media print { @page { margin: 0.6in; } .no-print { display: none !important; } body { padding: 0 !important; max-width: none !important; } }' +
      'body { font-family: Tahoma, "Trebuchet MS", sans-serif; color: #1C1C1C; max-width: 720px; margin: 0 auto; padding: 40px 32px; line-height: 1.55; }' +
      '.hd { display: flex; align-items: center; justify-content: space-between; padding-bottom: 18px; border-bottom: 1px solid #E8E6DD; margin-bottom: 24px; }' +
      '.hd img { height: 32px; width: auto; }' +
      '.tag { font-size: 11px; letter-spacing: 2px; color: #45AADD; font-weight: 700; text-transform: uppercase; margin-bottom: 10px; }' +
      'h1 { font-size: 26px; margin: 0 0 12px; line-height: 1.2; font-weight: 700; }' +
      '.def { font-size: 13.5px; color: #444; margin-bottom: 28px; }' +
      '.section { margin-bottom: 22px; page-break-inside: avoid; }' +
      '.section-title { font-size: 11px; letter-spacing: 1.5px; color: #5F5E5A; font-weight: 700; text-transform: uppercase; margin: 0 0 10px; padding-bottom: 6px; border-bottom: 1px solid #F1EFE8; }' +
      '.heading { font-weight: 700; font-size: 13px; margin: 10px 0 6px; }' +
      '.item { display: flex; align-items: flex-start; gap: 10px; padding: 5px 0; font-size: 13.5px; line-height: 1.5; }' +
      '.cb { flex-shrink: 0; width: 14px; height: 14px; border: 1.5px solid #1C1C1C; border-radius: 2px; margin-top: 3px; background: #fff; display: inline-block; }' +
      '.subs { margin-left: 26px; margin-top: 2px; margin-bottom: 4px; }' +
      '.sub-item { display: flex; align-items: flex-start; gap: 10px; padding: 3px 0; font-size: 12.5px; line-height: 1.5; color: #444; }' +
      '.cb-small { flex-shrink: 0; width: 12px; height: 12px; border: 1.2px solid #888780; border-radius: 2px; margin-top: 3px; background: #fff; display: inline-block; }' +
      '.help { margin-top: 32px; padding: 18px 22px; background: #F2F8FC; border-left: 4px solid #45AADD; border-radius: 0 4px 4px 0; page-break-inside: avoid; }' +
      '.help-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }' +
      '.help-txt { font-size: 13px; color: #444; margin: 0; line-height: 1.5; }' +
      '.help-link { color: #45AADD; text-decoration: none; font-weight: 700; word-break: break-all; }' +
      '.print-btn { background: #45AADD; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }' +
      '.print-btn:hover { background: #2E94C9; }' +
      '</style></head><body>' +
      '<div class="hd">' +
        '<img src="' + LOGO_URL + '" alt="Ascend Indiana" />' +
        '<button class="print-btn no-print" onclick="window.print()">Print this page</button>' +
      '</div>' +
      '<div class="tag">Readiness checklist</div>' +
      '<h1>' + escHtml(name) + '</h1>' +
      '<p class="def">' + escHtml(definition) + '</p>' +
      sectionsHtml +
      '<div class="help">' +
        '<div class="help-title">For help</div>' +
        '<p class="help-txt">Connect with a local intermediary who can help you launch this work-based learning experience: <a class="help-link" href="' + INTERMEDIARY_URL + '">' + INTERMEDIARY_URL + '</a></p>' +
      '</div>' +
      '</body></html>';
    const w = window.open('', '_blank');
    if (!w) { alert('Pop-up blocked. Please allow pop-ups to print the checklist.'); return; }
    w.document.open();
    w.document.write(html);
    w.document.close();
  };
  
  render();
})();
</script>

</div>
</body>
</html>
